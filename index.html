  <style>
    :root {
      --c-bg: oklch(0.98 0.005 80);
      --c-surface: #ffffff;
      --c-border: oklch(0.92 0.005 80);
      --c-grid: oklch(0.94 0.005 80);
      --c-line: oklch(0.86 0.01 80);
      --c-text: oklch(0.20 0.01 60);
      --c-muted: oklch(0.55 0.01 60);
      --c-accent: #2D8F5E;
      --c-avail: oklch(0.62 0.16 145);
      --c-full:  oklch(0.58 0.21 25);
      --c-map-bg: oklch(0.985 0.005 80);
      --font-sans: 'Helvetica Neue', Helvetica, 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--c-bg); min-height: 100vh; }
    body { font-family: var(--font-sans); color: var(--c-text); -webkit-font-smoothing: antialiased; }
    button { font-family: inherit; }
    @keyframes llamita-blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes llamita-pulse { 0%{width:14px;height:14px;opacity:0.6} 100%{width:80px;height:80px;opacity:0} }
    @keyframes llamita-sheet-up { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes llamita-fade { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    *::-webkit-scrollbar { width:6px;height:6px } *::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:3px} *::-webkit-scrollbar-track{background:transparent}
    #root { animation: llamita-fade 0.3s ease-out; }
